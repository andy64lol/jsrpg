<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSRPG demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000;
        color: #edf2ff;
        font-family: Inter, system-ui, sans-serif;
      }

      .game-container {
        position: relative;
        display: inline-block;
      }

      canvas {
        width: 560px;
        height: 560px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        border: 4px solid #000000;
        background: #000000;
        display: block;
      }

      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 4px;
        pointer-events: none;
        z-index: 10;
      }

      .hud-heart {
        display: block;
        width: 24px;
        height: 24px;
      }
    </style>
  </head>

  <body>
    <div class="game-container">
      <canvas id="game" width="56" height="56" aria-label="RPG game window"></canvas>
      <div id="hud" class="hud" aria-label="health display"></div>
    </div>
    <script type="module">
      import Game from "./engine/index.js";
      const KEY_DIRECTIONS = {
        w: true,
        arrowup: true,
        s: true,
        arrowdown: true,
        a: true,
        arrowleft: true,
        d: true,
        arrowright: true
      };
      const canvas = document.getElementById("game");
      const hud = document.getElementById("hud");
      const game = new Game(canvas, hud);
      async function init() {
        try {
          await game.start("map1");
          requestAnimationFrame(loop);
        } catch (error) {
          console.error(error);
        }
      }
      window.addEventListener("keydown", event => {
        if (event.defaultPrevented) return;
        const key = event.key.toLowerCase();
        if (KEY_DIRECTIONS[key]) {
          event.preventDefault();
          game.setMoveKey(key, true);
        }
      });
      window.addEventListener("keyup", event => {
        const key = event.key.toLowerCase();
        if (KEY_DIRECTIONS[key]) {
          event.preventDefault();
          game.setMoveKey(key, false);
        }
      });
      init();

      function loop(now) {
        game.update(now);
        game.draw();
        requestAnimationFrame(loop);
      }
    </script>
  </body>

</html>
