<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSRPG demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      @font-face {
        font-family: "PixeloidMono";
        src: url("./assets/UI/font/PixeloidMono-nAOpP.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000;
        color: #edf2ff;
        font-family: "PixeloidMono", monospace, system-ui, sans-serif;
      }

      .game-container {
        position: relative;
        display: inline-block;
      }

      canvas {
        width: 560px;
        height: 560px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        border: 4px solid #000000;
        background: #000000;
        display: block;
      }

      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 4px;
        pointer-events: none;
        z-index: 10;
      }

      .hud-heart {
        display: block;
        width: 24px;
        height: 24px;
      }

      .inventory {
        position: fixed;
        bottom: 12px;
        left: 12px;
        display: none; 
        flex-direction: row;
        gap: 4px;
        background: rgba(0, 0, 0, 0.75);
        border: 1px solid #5f7cff;
        border-radius: 8px;
        padding: 6px;
        z-index: 10;
      }

      .inventory.open {
        display: flex;
      }

      .inventory-slot {
        width: 44px;
        height: 44px;
        border: 2px solid #ffffff22;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: default;
        flex-shrink: 0;
        transition: border-color 0.1s;
      }

      .inventory-slot:hover {
        border-color: #ffffff55;
      }

      .inventory-slot.selected {
        border-color: #5f7cff;
        background: rgba(95, 124, 255, 0.24);
      }

      .inventory-item-icon {
        width: 32px;
        height: 32px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        display: block;
      }
      .inventory-item-fallback {
        font-size: 18px;
        opacity: 0.7;
        color: #edf2ff;
        font-family: "PixeloidMono", monospace;
      }

      .inventory-tooltip {
        position: fixed;
        z-index: 30;
        background: rgba(0, 0, 0, 0.92);
        border: 1px solid #5f7cff;
        border-radius: 8px;
        padding: 8px 12px;
        color: #edf2ff;
        font-family: "PixeloidMono", monospace, system-ui, sans-serif;
        font-size: 12px;
        pointer-events: none;
        display: none;
        max-width: 200px;
        line-height: 1.5;
      }

      .inventory-tooltip-name {
        color: #fff;
        font-size: 13px;
        margin-bottom: 4px;
      }

      .inventory-tooltip-desc {
        color: #c0cbff;
        font-size: 11px;
        margin-bottom: 4px;
        opacity: 0.85;
      }

      .inventory-tooltip-stat {
        color: #7cffaa;
        font-size: 11px;
      }
      .settings-button {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 20;
        padding: 0;
        border: none;
        background: transparent;
        cursor: pointer;
        outline: none;
      }

      .settings-button img {
        display: block;
        width: 64px;   
        height: 64px;  
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }

      .settings-panel {
        position: fixed;
        top: 84px;   
        right: 12px;
        z-index: 20;
        width: 200px;
        background: rgba(0, 0, 0, 0.95);
        border: 1px solid #5f7cff;
        border-radius: 10px;
        padding: 12px;
        color: #edf2ff;
        display: none;
        font-size: 13px;
      }

      .settings-panel-title {
        text-align: center;
        margin-bottom: 10px;
        opacity: 0.7;
        letter-spacing: 0.05em;
      }

      .settings-img-btn {
        display: block;
        width: 100%;
        padding: 0;
        margin-top: 8px;
        border: none;
        background: transparent;
        cursor: pointer;
        outline: none;
        text-align: center;
      }

      .settings-img-btn img {
        width: 128px;  
        height: 64px;  
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }

      .settings-text-btn {
        display: block;
        width: 100%;
        margin-top: 8px;
        padding: 8px;
        border: 1px solid #edf2ff33;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        color: #edf2ff;
        cursor: pointer;
        font-family: "PixeloidMono", monospace, system-ui, sans-serif;
        font-size: 12px;
        transition: border-color 0.1s, background 0.1s;
      }

      .settings-text-btn:hover {
        border-color: #5f7cff;
        background: rgba(95, 124, 255, 0.15);
      }

      .settings-text-btn.danger:hover {
        border-color: #ff5f5f;
        background: rgba(255, 95, 95, 0.15);
      }
      #importFileInput {
        display: none;
      }
      .message {
        position: fixed;
        bottom: 92px;
        left: 12px;
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.85);
        border: 1px solid #5f7cff;
        border-radius: 8px;
        color: #edf2ff;
        font-family: "PixeloidMono", monospace, system-ui, sans-serif;
        font-size: 14px;
        z-index: 15;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div class="game-container">
      <canvas id="game" width="56" height="56" aria-label="RPG game window"></canvas>
      <div id="hud" class="hud" aria-label="health display"></div>
      <div id="inventory" class="inventory" aria-label="inventory display"></div>
    </div>

    <div id="message" class="message" aria-live="polite"></div>
    <div id="inventoryTooltip" class="inventory-tooltip" role="tooltip" aria-hidden="true"></div>

    <button id="settingsButton" class="settings-button" type="button" aria-label="Settings" title="Settings">
      <img id="settingsButtonImg"
           src="./assets/UI/buttons/settings.png"
           data-normal="./assets/UI/buttons/settings.png"
           data-hover="./assets/UI/buttons/settings_hover.png"
           alt="Settings" />
    </button>

    <div id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div class="settings-panel-title">Settings</div>

      <button id="downloadSaveButton" class="settings-img-btn" type="button" aria-label="Download save file" title="Download save file">
        <img src="./assets/UI/buttons/save.png"
             data-normal="./assets/UI/buttons/save.png"
             data-hover="./assets/UI/buttons/save_hover.png"
             alt="Download Save" />
      </button>

      <button id="importSaveButton" class="settings-img-btn" type="button" aria-label="Import save file" title="Import save file">
        <img src="./assets/UI/buttons/load.png"
             data-normal="./assets/UI/buttons/load.png"
             data-hover="./assets/UI/buttons/load_hover.png"
             alt="Import Save" />
      </button>
      <input type="file" id="importFileInput" accept=".json" />

      <button id="toggleMusicButton" class="settings-text-btn" type="button">Toggle Music</button>
      <button id="clearSaveButton" class="settings-text-btn danger" type="button">Reset Save</button>
    </div>

    <script type="module">
      import Game from "./engine/index.js";

      const KEY_DIRECTIONS = {
        w: true,
        arrowup: true,
        s: true,
        arrowdown: true,
        a: true,
        arrowleft: true,
        d: true,
        arrowright: true
      };

      const canvas             = document.getElementById("game");
      const hud                = document.getElementById("hud");
      const inventory          = document.getElementById("inventory");
      const inventoryTooltip   = document.getElementById("inventoryTooltip");
      const messageElement     = document.getElementById("message");
      const settingsButton     = document.getElementById("settingsButton");
      const settingsButtonImg  = document.getElementById("settingsButtonImg");
      const settingsPanel      = document.getElementById("settingsPanel");
      const downloadSaveBtn    = document.getElementById("downloadSaveButton");
      const importSaveBtn      = document.getElementById("importSaveButton");
      const importFileInput    = document.getElementById("importFileInput");
      const toggleMusicButton  = document.getElementById("toggleMusicButton");
      const clearSaveButton    = document.getElementById("clearSaveButton");

      let inventoryOpen = false;

      function setInventoryOpen(open) {
        inventoryOpen = open;
        inventory.classList.toggle("open", open);
        inventory.setAttribute("aria-hidden", String(!open));
        if (!open) { hideTooltip(); }
      }

      function hideTooltip() {
        inventoryTooltip.style.display = "none";
        inventoryTooltip.setAttribute("aria-hidden", "true");
      }

      function showTooltip(slot) {
        const name = slot.dataset.name || "";
        const desc = slot.dataset.desc || "";
        const stat = slot.dataset.stat || "";
        if (!name && !desc && !stat) { return; }

        inventoryTooltip.innerHTML =
          (name ? `<div class="inventory-tooltip-name">${name}</div>` : "") +
          (desc ? `<div class="inventory-tooltip-desc">${desc}</div>`  : "") +
          (stat ? `<div class="inventory-tooltip-stat">${stat}</div>`  : "");
        inventoryTooltip.style.display = "block";
        inventoryTooltip.setAttribute("aria-hidden", "false");

        const slotRect = slot.getBoundingClientRect();
        const tipW = inventoryTooltip.offsetWidth;
        const tipH = inventoryTooltip.offsetHeight;
        let x = slotRect.left + slotRect.width / 2 - tipW / 2;
        let y = slotRect.top  - tipH - 8;
        if (y < 8) { y = slotRect.bottom + 8; }
        x = Math.max(8, Math.min(x, window.innerWidth  - tipW - 8));
        y = Math.max(8, Math.min(y, window.innerHeight - tipH - 8));
        inventoryTooltip.style.left = `${x}px`;
        inventoryTooltip.style.top  = `${y}px`;
      }

      inventory.addEventListener("mouseover", (e) => {
        const slot = e.target.closest(".inventory-slot");
        if (slot) { showTooltip(slot); }
      });
      inventory.addEventListener("mouseout", (e) => {
        if (!e.relatedTarget || !inventory.contains(e.relatedTarget)) { hideTooltip(); }
      });

      const game = new Game(canvas, hud, inventory, messageElement);
      async function init() {
        try {
          await game.start("map1");
          requestAnimationFrame(loop);
        } catch (err) {
          console.error(err);
        }
      }

      function loop(now) {
        game.update(now);
        game.draw();
        requestAnimationFrame(loop);
      }
      function attachHoverSprite(buttonEl) {
        const img = buttonEl.querySelector("img[data-hover]");
        if (!img) { return; }
        buttonEl.addEventListener("pointerenter", () => {
          img.src = img.dataset.hover;
        });
        buttonEl.addEventListener("pointerleave", () => {
          img.src = img.dataset.normal;
        });
        buttonEl.addEventListener("blur", () => {
          img.src = img.dataset.normal;
        });
      }

      attachHoverSprite(settingsButton);
      attachHoverSprite(downloadSaveBtn);
      attachHoverSprite(importSaveBtn);

      settingsButton.addEventListener("click", () => {
        const isOpen = settingsPanel.style.display === "block";
        settingsPanel.style.display = isOpen ? "none" : "block";
        settingsPanel.setAttribute("aria-hidden", String(isOpen));
      });

      document.addEventListener("pointerdown", (e) => {
        if (settingsPanel.style.display !== "block") { return; }
        if (!settingsPanel.contains(e.target) && e.target !== settingsButton && !settingsButton.contains(e.target)) {
          settingsPanel.style.display = "none";
          settingsPanel.setAttribute("aria-hidden", "true");
        }
      });

      downloadSaveBtn.addEventListener("click", () => {
        game.downloadSave();
      });

      importSaveBtn.addEventListener("click", () => {
        importFileInput.value = "";  
        importFileInput.click();
      });

      importFileInput.addEventListener("change", () => {
        const file = importFileInput.files[0];
        if (file) {
          game.importSave(file);
        }
      });

      toggleMusicButton.addEventListener("click", () => {
        game.toggleMusic();
      });

      
      clearSaveButton.addEventListener("click", () => {
        game.clearSave();
        window.location.reload();
      });



      window.addEventListener("keydown", event => {
        if (event.defaultPrevented) { return; }
        const key = event.key.toLowerCase();

        if (KEY_DIRECTIONS[key]) {
          event.preventDefault();
          game.setMoveKey(key, true);
          return;
        }

        if (key === "i") {
          event.preventDefault();
          setInventoryOpen(!inventoryOpen);
          return;
        }

        if (key === "escape" && inventoryOpen) {
          event.preventDefault();
          setInventoryOpen(false);
          return;
        }

        if (key === "e") {
          event.preventDefault();
          game.useSelectedItem();
          return;
        }

        if (key === "f") {
          event.preventDefault();
          game.interactForward();
          return;
        }

        if (key === "[") {
          event.preventDefault();
          game.cycleInventory(-1);
          return;
        }

        if (key === "]") {
          event.preventDefault();
          game.cycleInventory(1);
          return;
        }
      });

      window.addEventListener("keyup", event => {
        const key = event.key.toLowerCase();
        if (KEY_DIRECTIONS[key]) {
          event.preventDefault();
          game.setMoveKey(key, false);
        }
      });

      canvas.addEventListener("click", event => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (event.clientX - rect.left) * scaleX;
        const clickY = (event.clientY - rect.top) * scaleY;
        const tileX = Math.floor(clickX / game.tileSize);
        const tileY = Math.floor(clickY / game.tileSize);
        const camera = game.getCamera();
        game.interactAt(camera.x + tileX, camera.y + tileY);
      });

      init();
    </script>
  </body>

</html>
