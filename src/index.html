<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSRPG demo</title>
    <style>
      * { box-sizing: border-box; }

      @font-face {
        font-family: "PixeloidMono";
        src: url("./assets/UI/font/PixeloidMono-nAOpP.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000;
        color: #ffffff;
        font-family: "PixeloidMono", monospace, system-ui, sans-serif;
      }

      .game-container {
        position: relative;
        display: inline-block;
      }

      canvas {
        width: 560px;
        height: 560px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        border: 4px solid #000000;
        background: #000000;
        display: block;
      }

      
.hud {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 4px;
        pointer-events: none;
        z-index: 10;
      }
      .hud-heart {
        display: block;
        width: 24px;
        height: 24px;
      }

      .settings-button {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 20;
        padding: 0;
        border: none;
        background: transparent;
        cursor: pointer;
        outline: none;

      }
      .settings-button img {
        display: block;
        width: 64px;
        height: 64px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }
      .settings-panel {
        position: fixed;
        top: 84px;
        right: 12px;
        z-index: 20;
        width: 200px;
        background: #000;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 10px;
        padding: 12px;
        color: #fff;
        display: none;
        font-size: 13px;
      }
      .settings-panel-title {
        text-align: center;
        margin-bottom: 10px;
        opacity: 0.7;
        letter-spacing: 0.05em;
      }
      .settings-img-btn {
        display: block;
        width: 100%;
        padding: 0;
        margin-top: 8px;
        border: none;
        background: transparent;
        cursor: pointer;
        outline: none;
        text-align: center;
      }
      .settings-img-btn img {
        width: 128px;
        height: 64px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }
      .settings-text-btn {
        display: block;
        width: 100%;
        margin-top: 8px;
        padding: 8px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        background: rgba(255,255,255,0.06);
        color: #ffffff;
        cursor: pointer;
        font-family: "PixeloidMono", monospace, system-ui, sans-serif;
        font-size: 12px;
        transition: border-color 0.1s, background 0.1s;
      }
      .settings-text-btn:hover { border-color: #fff; background: rgba(255,255,255,0.1); }
      .settings-text-btn.danger:hover { border-color: #ff5f5f; background: rgba(255,95,95,0.1); }
      #importFileInput { display: none; }

      .message {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 18px;
        background: #000;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 8px;
        color: #fff;
        font-family: "PixeloidMono", monospace, system-ui, sans-serif;
        font-size: 13px;
        z-index: 15;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
        white-space: nowrap;
      }

      .inv-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.82);
      }
      .inv-overlay.open { display: flex; }

      .inv-panel {
        width: 540px;
        background: #000;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .inv-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.15);
      }
      .inv-title {
        font-size: 14px;
        letter-spacing: 0.12em;
        color: #fff;
        text-transform: uppercase;
      }
      .inv-header-hint {
        font-size: 10px;
        color: rgba(255,255,255,0.3);
      }

      .inv-body {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .inv-grid-wrap {
        flex: 1;
        padding: 14px;
        overflow-y: auto;
      }
      .inv-grid {
        display: grid;
        grid-template-columns: repeat(4, 72px);
        gap: 8px;
      }

      .inv-slot {
        width: 72px;
        height: 72px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: rgba(255,255,255,0.03);
        transition: border-color 0.12s, background 0.12s;
        position: relative;
      }
      .inv-slot:hover {
        border-color: rgba(255,255,255,0.4);
        background: rgba(255,255,255,0.07);
      }
      .inv-slot.selected {
        border-color: #fff;
        background: rgba(255,255,255,0.1);
      }
      .inv-slot-icon {
        width: 48px;
        height: 48px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        display: block;
      }
      .inv-slot-fallback {
        font-size: 22px;
        color: #ffffff;
        opacity: 0.6;
      }

      .inv-empty-msg {
        grid-column: 1 / -1;
        padding: 32px 0;
        text-align: center;
        font-size: 11px;
        color: rgba(255,255,255,0.25);
        letter-spacing: 0.06em;
      }

      .inv-detail {
        width: 170px;
        min-width: 170px;
        border-left: 1px solid rgba(255,255,255,0.12);
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.02);
      }
      .inv-detail-icon {
        width: 64px;
        height: 64px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        padding: 6px;
        background: rgba(0,0,0,0.3);
      }
      .inv-detail-name {
        font-size: 12px;
        color: #fff;
        text-align: center;
        line-height: 1.4;
        word-break: break-word;
      }
      .inv-detail-desc {
        font-size: 10px;
        color: rgba(255,255,255,0.55);
        text-align: center;
        line-height: 1.5;
      }
      .inv-detail-stat {
        font-size: 11px;
        color: #fff;
        text-align: center;
      }
      .inv-detail-placeholder {
        font-size: 10px;
        color: rgba(255,255,255,0.2);
        text-align: center;
        margin-top: auto;
        line-height: 1.6;
      }
      .inv-detail-use {
        margin-top: auto;
        font-size: 10px;
        color: rgba(255,255,255,0.35);
        text-align: center;
      }



      .inv-footer {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 10px 16px;
        border-top: 1px solid rgba(255,255,255,0.12);
        background: transparent;
      }
      .inv-footer-hint {
        font-size: 10px;
        color: rgba(255,255,255,0.3);
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .inv-kbd {
        display: inline-block;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 3px;
        padding: 1px 5px;
        font-family: "PixeloidMono", monospace;
        font-size: 9px;
        color: #fff;
        line-height: 1.4;
      }

      #startScreen {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000;
        gap: 20px;
      }
      #startScreen.hidden { display: none; }
      .start-logo {
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        width: 256px;
        height: 128px;
        margin-bottom: 16px;
      }
      .start-img-btn {
        background: transparent;
        border: none;
        padding: 0;
        cursor: pointer;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        display: block;
      }
      .start-img-btn img {
        width: 128px;
        height: 64px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        display: block;
        transition: opacity 0.1s;
      }
      .start-img-btn:hover img { opacity: 0.75; }
      .start-btn-text {
        font-family: "PixeloidMono", monospace;
        font-size: 11px;
        color: #fff;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 4px;
        padding: 8px 32px;
        cursor: pointer;
        letter-spacing: 0.1em;
        transition: border-color 0.1s, background 0.1s;
      }
      .start-btn-text:hover { border-color: #fff; background: rgba(255,255,255,0.07); }
      .start-hint {
        font-family: "PixeloidMono", monospace;
        font-size: 10px;
        color: rgba(255,255,255,0.18);
        margin-top: 12px;
        letter-spacing: 0.08em;
      }
    </style>
  </head>

  <body>
    <div id="startScreen">
      <img src="./assets/UI/menu/game_title.png" class="start-logo" alt="JSRPG" />
      <button class="start-btn-text" id="btnNewGame" type="button" aria-label="New Game">New Game</button>
      <button class="start-btn-text" id="btnContinue" type="button" style="display:none">Continue</button>
      <div class="start-hint">arrow keys / wasd to move</div>
    </div>

    <div class="game-container">
      <canvas id="game" width="56" height="56" aria-label="RPG game window"></canvas>
      <div id="hud" class="hud" aria-label="health display"></div>
    </div>

    <div id="message" class="message" aria-live="polite"></div>

    <div id="inventoryOverlay" class="inv-overlay" aria-hidden="true" role="dialog" aria-label="Inventario">
      <div class="inv-panel">

        <div class="inv-header">
          <span class="inv-title">Inventario</span>
          <span class="inv-header-hint"><kbd class="inv-kbd">I</kbd> cerrar</span>
        </div>

        <div class="inv-body">
          <div class="inv-grid-wrap">
            <div id="inventoryGrid" class="inv-grid">
            </div>
          </div>
          <div class="inv-detail" id="inventoryDetail">
            <p class="inv-detail-placeholder">Selecciona<br>un objeto</p>
          </div>
        </div>

        <div class="inv-footer">
          <span class="inv-footer-hint"><kbd class="inv-kbd">E</kbd> Usar</span>
          <span class="inv-footer-hint"><kbd class="inv-kbd">[</kbd><kbd class="inv-kbd">]</kbd> Navegar</span>
          <span class="inv-footer-hint"><kbd class="inv-kbd">I</kbd> / <kbd class="inv-kbd">ESC</kbd> Cerrar</span>
        </div>

      </div>
    </div>

    <button id="settingsButton" class="settings-button" type="button" aria-label="Settings" title="Settings">
      <img id="settingsButtonImg"
           src="./assets/UI/buttons/settings.png"
           data-normal="./assets/UI/buttons/settings.png"
           data-hover="./assets/UI/buttons/settings_hover.png"
           alt="Settings" />
    </button>

    <div id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div class="settings-panel-title">Settings</div>

      <button id="downloadSaveButton" class="settings-img-btn" type="button" aria-label="Download save file">
        <img src="./assets/UI/buttons/save.png"
             data-normal="./assets/UI/buttons/save.png"
             data-hover="./assets/UI/buttons/save_hover.png"
             alt="Download Save" />
      </button>

      <button id="importSaveButton" class="settings-img-btn" type="button" aria-label="Import save file">
        <img src="./assets/UI/buttons/load.png"
             data-normal="./assets/UI/buttons/load.png"
             data-hover="./assets/UI/buttons/load_hover.png"
             alt="Import Save" />
      </button>
      <input type="file" id="importFileInput" accept=".json" />

      <button id="toggleMusicButton" class="settings-text-btn" type="button">Toggle Music</button>
      <button id="clearSaveButton" class="settings-text-btn danger" type="button">Reset Save</button>
    </div>

    <script type="module">
      import Game from "./engine/index.js";

      const KEY_DIRECTIONS = {
        w: true, arrowup: true,
        s: true, arrowdown: true,
        a: true, arrowleft: true,
        d: true, arrowright: true
      };

      const inventoryGrid    = document.getElementById("inventoryGrid");
      const inventoryOverlay = document.getElementById("inventoryOverlay");
      const inventoryDetail  = document.getElementById("inventoryDetail");
      const messageElement   = document.getElementById("message");
      const hud              = document.getElementById("hud");
      const settingsButton   = document.getElementById("settingsButton");
      const settingsPanel    = document.getElementById("settingsPanel");
      const downloadSaveBtn  = document.getElementById("downloadSaveButton");
      const importSaveBtn    = document.getElementById("importSaveButton");
      const importFileInput  = document.getElementById("importFileInput");
      const toggleMusicButton = document.getElementById("toggleMusicButton");
      const clearSaveButton  = document.getElementById("clearSaveButton");
      const canvas           = document.getElementById("game");

      // pasa el grid como inventoryElement para que drawInventoryUI() lo llene
      const game = new Game(canvas, hud, inventoryGrid, messageElement);

      // Inventario cerrar o abrir
      function setInventoryOpen(open) {
        game.setInventoryOpen(open);
        inventoryOverlay.classList.toggle("open", open);
        inventoryOverlay.setAttribute("aria-hidden", String(!open));
        if (open) {
          renderInventoryGrid();
          renderInventoryDetail();
        }
      }

      // detalles del item que vos agarras o hover
      function renderInventoryDetail(hoveredIndex) {
        const idx    = hoveredIndex ?? game.selectedInventoryIndex;
        const itemId = game.inventory?.[idx];
        const item   = game.itemDefinitions?.[itemId];

        if (!item) {
          const empty = !game.inventory?.length;
          inventoryDetail.innerHTML = `<p class="inv-detail-placeholder">${
            empty ? "Inventario<br>vacío" : "Selecciona<br>un objeto"
          }</p>`;
          return;
        }

        const esc = (s) => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;");
        let stat = "";
        if (item.use?.action === "heal")      stat = `+${item.use.amount} HP`;
        else if (item.type === "consumable")  stat = "Consumible";

        inventoryDetail.innerHTML = `
          ${item.texture ? `<img src="${item.texture}" class="inv-detail-icon" alt="">` : ""}
          <div class="inv-detail-name">${esc(item.display_name ?? itemId)}</div>
          ${item.description ? `<div class="inv-detail-desc">${esc(item.description)}</div>` : ""}
          ${stat             ? `<div class="inv-detail-stat">${esc(stat)}</div>` : ""}
          <div class="inv-detail-use"><kbd class="inv-kbd">E</kbd> para usar</div>
        `;
      }

      function renderInventoryGrid() {
        game.drawInventoryUI();
        if (!game.inventory?.length) {
          inventoryGrid.innerHTML = `<div class="inv-empty-msg">Inventario vacío</div>`;
        }
      }
      
      inventoryGrid.addEventListener("click", (e) => {
        const slot = e.target.closest(".inv-slot");
        if (!slot) { return; }
        const idx = Number(slot.dataset.index);
        game.selectedInventoryIndex = idx;
        game._inventoryRenderKey = null; // fuerza re-renderizarlo
        renderInventoryGrid();
        renderInventoryDetail();
      });

      inventoryGrid.addEventListener("mouseover", (e) => {
        const slot = e.target.closest(".inv-slot");
        if (slot) { renderInventoryDetail(Number(slot.dataset.index)); }
      });
      inventoryGrid.addEventListener("mouseout", (e) => {
        if (!e.relatedTarget || !inventoryGrid.contains(e.relatedTarget)) {
          renderInventoryDetail();
        }
      });

// auto abrir el inventario cuando agarras vos algo
      game.onInventoryChanged = () => {
        if (!game.inventoryOpen) {
          setInventoryOpen(true);
        } else {
          renderInventoryGrid();
          renderInventoryDetail();
        }
      };

      const _origDraw = game.drawInventoryUI.bind(game);
      game.drawInventoryUI = function () {
        _origDraw();
        if (game.inventoryOpen) { renderInventoryDetail(); }
      };

      async function init(freshStart) {
        try {
          if (freshStart) {
            game.clearSave();
          }
          await game.start("map1");
          requestAnimationFrame(loop);
        } catch (err) {
          console.error(err);
        }
      }

      function loop(now) {
        game.update(now);
        game.draw();
        requestAnimationFrame(loop);
      }

      const startScreen  = document.getElementById("startScreen");
      const btnNewGame   = document.getElementById("btnNewGame");
      const btnContinue  = document.getElementById("btnContinue");

      const hasSave = !!localStorage.getItem("jsrpg_save");
      if (hasSave) {
        btnContinue.style.display = "";
      }

      btnNewGame.addEventListener("click", () => {
        startScreen.classList.add("hidden");
        init(true);
      });

      btnContinue.addEventListener("click", () => {
        startScreen.classList.add("hidden");
        init(false);
      });

      //los configuraciones o settings esos
      
      function attachHoverSprite(buttonEl) {
        const img = buttonEl.querySelector("img[data-hover]");
        if (!img) { return; }
        buttonEl.addEventListener("pointerenter", () => { img.src = img.dataset.hover; });
        buttonEl.addEventListener("pointerleave", () => { img.src = img.dataset.normal; });
        buttonEl.addEventListener("blur",         () => { img.src = img.dataset.normal; });
      }

      attachHoverSprite(settingsButton);
      attachHoverSprite(downloadSaveBtn);
      attachHoverSprite(importSaveBtn);

      settingsButton.addEventListener("click", () => {
        const isOpen = settingsPanel.style.display === "block";
        settingsPanel.style.display = isOpen ? "none" : "block";
        settingsPanel.setAttribute("aria-hidden", String(isOpen));
      });

      document.addEventListener("pointerdown", (e) => {
        if (settingsPanel.style.display !== "block") { return; }
        if (!settingsPanel.contains(e.target) && e.target !== settingsButton && !settingsButton.contains(e.target)) {
          settingsPanel.style.display = "none";
          settingsPanel.setAttribute("aria-hidden", "true");
        }
      });

      downloadSaveBtn.addEventListener("click",  () => { game.downloadSave(); });
      importSaveBtn.addEventListener("click",    () => { importFileInput.value = ""; importFileInput.click(); });
      importFileInput.addEventListener("change", () => { if (importFileInput.files[0]) { game.importSave(importFileInput.files[0]); } });
      toggleMusicButton.addEventListener("click",() => { game.toggleMusic(); });
      clearSaveButton.addEventListener("click",  () => { game.clearSave(); window.location.reload(); });

      window.addEventListener("keydown", event => {
        if (event.defaultPrevented) { return; }
        const key = event.key.toLowerCase();

        if (KEY_DIRECTIONS[key]) {
          event.preventDefault();
          game.setMoveKey(key, true);
          return;
        }

        if (key === "i") {
          event.preventDefault();
          setInventoryOpen(!game.inventoryOpen);
          return;
        }

        if (key === "escape") {
          event.preventDefault();
          if (game.inventoryOpen) { setInventoryOpen(false); }
          return;
        }

        if (key === "e") {
          event.preventDefault();
          game.useSelectedItem();
          if (game.inventoryOpen) { renderInventoryGrid(); renderInventoryDetail(); }
          return;
        }

        if (key === "f") {
          event.preventDefault();
          game.interactForward();
          return;
        }

        if (key === "x") {
          event.preventDefault();
          game.attackForward();
          return;
        }

        if (key === "[") {
          event.preventDefault();
          game.cycleInventory(-1);
          if (game.inventoryOpen) { renderInventoryGrid(); renderInventoryDetail(); }
          return;
        }

        if (key === "]") {
          event.preventDefault();
          game.cycleInventory(1);
          if (game.inventoryOpen) { renderInventoryGrid(); renderInventoryDetail(); }
          return;
        }
      });

      window.addEventListener("keyup", event => {
        const key = event.key.toLowerCase();
        if (KEY_DIRECTIONS[key]) {
          event.preventDefault();
          game.setMoveKey(key, false);
        }
      });

      canvas.addEventListener("click", event => {
        if (game.inventoryOpen) { return; }
        const rect   = canvas.getBoundingClientRect();
        const scaleX = canvas.width  / rect.width;
        const scaleY = canvas.height / rect.height;
        const tileX  = Math.floor((event.clientX - rect.left) * scaleX / game.tileSize);
        const tileY  = Math.floor((event.clientY - rect.top)  * scaleY / game.tileSize);
        const camera = game.getCamera();
        game.interactAt(camera.x + tileX, camera.y + tileY);
      });
    </script>
  </body>
<!-- eso es todo -->
</html>
